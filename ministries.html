  <script>
    // Floating shapes background
    function createShapes() {
      const container = document.getElementById('shapes-container');
      if (!container) return;
      container.innerHTML = '';
      const shapeCount = window.innerWidth > 768 ? 12 : 6;
      for (let i = 0; i < shapeCount; i++) {
        const shape = document.createElement('div');
        const isCircle = Math.random() > 0.5;
        if (isCircle) {
          shape.classList.add('shape', 'shape-circle');
          const size = Math.random() * 150 + 50;
          shape.style.width = `${size}px`;
          shape.style.height = `${size}px`;
        } else {
          shape.classList.add('shape', 'shape-triangle');
        }
        shape.style.left = `${Math.random() * 100}%`;
        shape.style.animationDuration = `${Math.random() * 30 + 20}s`;
        shape.style.animationDelay = `-${Math.random() * 20}s`;
        shape.style.transform = `scale(${0.5 + Math.random() * 0.5})`;
        container.appendChild(shape);
      }
    }

    function initializeScrollTop() {
      const scrollTop = document.getElementById('scroll-top');
      if (!scrollTop) return;
      window.addEventListener('scroll', () => {
        if (window.pageYOffset > 300) scrollTop.classList.add('active');
        else scrollTop.classList.remove('active');
      });
      scrollTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }

    function initializeMobileNavigation() {
      const navToggle = document.getElementById('nav-toggle');
      const mobileMenuContainer = document.getElementById('mobile-menu-container');
      const mobileNavOverlay = document.getElementById('mobile-nav-overlay');
      const mobileMenuClose = document.getElementById('mobile-menu-close');

      function toggleMobileMenu() {
        if (mobileMenuContainer) mobileMenuContainer.classList.toggle('active');
        if (mobileNavOverlay) mobileNavOverlay.classList.toggle('active');
        document.body.style.overflow = mobileMenuContainer?.classList.contains('active') ? 'hidden' : '';
      }

      if (navToggle) {
        navToggle.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggleMobileMenu();
        });
      }

      if (mobileMenuClose) {
        mobileMenuClose.addEventListener('click', (e) => {
          e.preventDefault();
          toggleMobileMenu();
        });
      }

      if (mobileNavOverlay) {
        mobileNavOverlay.addEventListener('click', () => toggleMobileMenu());
      }

      // Mobile dropdowns
      document.querySelectorAll('.mobile-dropdown-parent').forEach(parent => {
        parent.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();

          const dropdownMenu = this.nextElementSibling;
          const dropdownToggle = this.querySelector('.mobile-dropdown-toggle');

          document.querySelectorAll('.mobile-dropdown-menu').forEach(menu => {
            if (menu !== dropdownMenu) menu.classList.remove('show');
          });
          document.querySelectorAll('.mobile-dropdown-toggle').forEach(toggle => {
            if (toggle !== dropdownToggle) toggle.classList.remove('active');
          });

          dropdownMenu?.classList.toggle('show');
          dropdownToggle?.classList.toggle('active');
        });
      });

      // Close mobile menu after clicking any link
      document.querySelectorAll('.mobile-dropdown-item, .mobile-nav-link:not(.mobile-dropdown-parent)').forEach(link => {
        link.addEventListener('click', () => {
          if (mobileMenuContainer?.classList.contains('active')) toggleMobileMenu();
        });
      });

      // Close on escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && mobileMenuContainer?.classList.contains('active')) toggleMobileMenu();
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      createShapes();
      initializeScrollTop();

      // Load header then init nav
      fetch('includes/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
          initializeMobileNavigation();
        })
        .catch(err => console.log('Header loading error:', err));

      // Notice
      fetch('notice.html')
        .then(r => r.text())
        .then(html => { document.getElementById('notice-container').innerHTML = html; })
        .catch(err => console.log('Notice loading error:', err));

      // Footer
      fetch('includes/footer.html')
        .then(r => r.text())
        .then(html => { document.getElementById('footer-placeholder').innerHTML = html; })
        .catch(err => console.log('Footer loading error:', err));

      // Touch effect
      document.querySelectorAll('.ministry-card').forEach(card => {
        card.addEventListener('touchstart', function() {
          this.style.transform = 'translateY(-5px) scale(0.98)';
        }, { passive: true });
        card.addEventListener('touchend', function() { this.style.transform = ''; });
      });
    });

    window.addEventListener('resize', createShapes);
  </script>
</body>
</html>
